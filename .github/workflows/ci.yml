# Koi App - CI Pipeline
# Runs on pushes to main/develop and pull requests
# Uses path filters so irrelevant jobs are skipped

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # DETECT CHANGES
  # ============================================================================
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      agent: ${{ steps.filter.outputs.agent }}
      mobile: ${{ steps.filter.outputs.mobile }}
      supabase: ${{ steps.filter.outputs.supabase }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            agent:
              - 'agent/**'
            mobile:
              - 'mobile/**'
            supabase:
              - 'supabase/**'

  # ============================================================================
  # LINT: PYTHON
  # ============================================================================
  lint-python:
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install linting tools
        run: pip install black ruff mypy

      - name: Run black
        run: black --check --line-length=100 agent/src/ agent/tests/

      - name: Run ruff
        run: ruff check agent/src/ agent/tests/

      - name: Run mypy
        run: mypy agent/src/ --ignore-missing-imports

  # ============================================================================
  # LINT: TYPESCRIPT
  # ============================================================================
  lint-typescript:
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/KoiApp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/KoiApp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint src/ --ext .ts,.tsx --max-warnings 0

      - name: Run Prettier
        run: npx prettier --check "src/**/*.{ts,tsx}"

  # ============================================================================
  # TEST: PYTHON AGENT
  # ============================================================================
  test-agent:
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.2"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: agent/.venv
          key: venv-${{ runner.os }}-py3.11-${{ hashFiles('agent/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-py3.11-

      - name: Install dependencies
        working-directory: agent
        run: poetry install --no-interaction

      - name: Run unit tests with coverage
        working-directory: agent
        run: |
          poetry run pytest tests/ -v \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=75

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-coverage
          path: agent/coverage.xml

  # ============================================================================
  # TEST: MOBILE APP
  # ============================================================================
  test-mobile:
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/KoiApp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/KoiApp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest with coverage
        run: |
          npx jest --ci --coverage \
            --coverageReporters=text --coverageReporters=cobertura \
            --coverageThreshold='{"global":{"branches":60,"functions":70,"lines":70,"statements":70}}'

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/KoiApp/coverage/

  # ============================================================================
  # TEST: SUPABASE EDGE FUNCTIONS
  # ============================================================================
  test-supabase:
    needs: changes
    if: needs.changes.outputs.supabase == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v1.x

      - name: Run Deno tests
        working-directory: supabase
        run: deno test --allow-env --allow-net tests/

  # ============================================================================
  # BUILD: AGENT DOCKER IMAGE (main branch only)
  # ============================================================================
  build-agent-docker:
    needs: [changes, test-agent]
    if: |
      needs.changes.outputs.agent == 'true' &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: agent
          file: agent/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/agent:${{ github.sha }}
            ghcr.io/${{ github.repository }}/agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
